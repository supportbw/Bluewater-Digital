<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluewater - Jobs & Courses Monitor</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --navy: #003876;
            --navy-dark: #002558;
            --navy-mid: #004a9a;
            --blue-accent: #1a6fc4;
            --blue-light: #4a9fd4;
            --urgent: #e05c00;
            --new: #1a6fc4;
            --available: #1e7e34;
            --full: #b02a37;
            --limited: #856404;
            --card-bg: #ffffff;
            --col-bg: #eef3f9;
            --border: #ccdaec;
            --text: #1a2b45;
            --text-muted: #5a7090;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
            background: var(--col-bg);
        }

        /* ─── HEADER ─── */
        .header {
            background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy) 50%, var(--navy-mid) 100%);
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #4a9fd4, #1a6fc4, #003876, #1a6fc4, #4a9fd4);
        }

        /* Wave texture in header */
        .header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='20' viewBox='0 0 60 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 10 Q15 0 30 10 Q45 20 60 10' stroke='rgba(255,255,255,0.04)' stroke-width='1.5' fill='none'/%3E%3C/svg%3E") repeat;
            opacity: 1;
        }

        .logo {
            z-index: 1;
            min-width: 200px;
            display: flex;
            align-items: center;
        }

        .logo-img {
            height: 56px;
            width: auto;
            object-fit: contain;
        }

        .header-clock {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 3.2em;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 4px;
            z-index: 1;
        }

        .header-weather {
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1;
            min-width: 220px;
            justify-content: flex-end;
        }

        .weather-icon-large {
            font-size: 1.8em;
            line-height: 1;
        }

        .weather-info {
            text-align: left;
        }

        .weather-city {
            font-size: 0.82em;
            color: rgba(255,255,255,0.7);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .weather-line {
            font-size: 1.05em;
            color: #ffffff;
            font-weight: 600;
        }

        .weather-sub {
            font-size: 0.78em;
            color: rgba(255,255,255,0.65);
        }

        /* ─── MAIN CONTENT ─── */
        .main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: calc(100vh - 80px - 38px - 90px);
            gap: 0;
        }

        .column {
            overflow: hidden;
            position: relative;
            background: var(--col-bg);
        }

        .column:first-child {
            border-right: 2px solid var(--border);
        }

        .col-header {
            padding: 14px 24px 10px;
            background: var(--col-bg);
            border-bottom: 2px solid var(--border);
            position: relative;
        }

        .col-header h2 {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1.7em;
            font-weight: 700;
            color: var(--blue-accent);
            letter-spacing: 0.5px;
        }

        .col-scroll-area {
            overflow: hidden;
            height: calc(100% - 50px);
            position: relative;
        }

        .column-wrapper {
            padding: 14px 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* ─── JOB CARDS ─── */
        .job-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 14px 16px;
            box-shadow: 0 1px 4px rgba(0,56,118,0.07);
            border-left: 3px solid var(--border);
            transition: box-shadow 0.2s;
        }

        .job-card:hover { box-shadow: 0 3px 12px rgba(0,56,118,0.12); }

        .job-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 5px;
        }

        .job-title {
            font-size: 1.05em;
            font-weight: 700;
            color: var(--text);
            line-height: 1.2;
            flex: 1;
        }

        .job-title a {
            color: var(--text);
            text-decoration: none;
        }

        .badge {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 0.78em;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 3px 9px;
            border-radius: 3px;
            white-space: nowrap;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .badge-urgent { background: var(--urgent); color: #fff; }
        .badge-new { background: var(--new); color: #fff; }
        .badge-available { background: var(--available); color: #fff; }
        .badge-more { background: #6c757d; color: #fff; }
        .badge-full { background: var(--full); color: #fff; }
        .badge-limited { background: var(--limited); color: #fff; }

        .job-sub {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85em;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .job-sub .sep { opacity: 0.4; }

        .job-meta {
            font-size: 0.8em;
            color: var(--text-muted);
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .job-meta span strong {
            color: var(--navy);
            font-weight: 600;
        }

        .one-badge img {
            height: 20px;
            width: auto;
            margin-left: 6px;
            vertical-align: middle;
            opacity: 0.85;
        }

        /* ─── COURSE CARDS ─── */
        .course-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 14px 16px;
            box-shadow: 0 1px 4px rgba(0,56,118,0.07);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
        }

        .course-card:hover { box-shadow: 0 3px 12px rgba(0,56,118,0.12); }

        .course-left { flex: 1; min-width: 0; }

        .course-name {
            font-size: 1.0em;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 5px;
            line-height: 1.2;
        }

        .course-name a { color: var(--text); text-decoration: none; }

        .course-details {
            font-size: 0.82em;
            color: var(--text-muted);
        }

        .course-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
            flex-shrink: 0;
        }

        .course-extra {
            font-size: 0.75em;
            color: var(--text-muted);
            text-align: right;
        }

        /* ─── OFFICE HOURS BAR ─── */
        .office-bar {
            height: 38px;
            background: linear-gradient(90deg, var(--navy) 0%, var(--navy-mid) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            flex-shrink: 0;
        }

        .office-item {
            color: rgba(255,255,255,0.85);
            font-size: 0.9em;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .office-item strong {
            color: #ffffff;
            font-weight: 700;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1.1em;
            letter-spacing: 1px;
            margin-left: 4px;
        }

        .office-sep {
            width: 1px;
            height: 18px;
            background: rgba(255,255,255,0.25);
        }

        /* ─── FOOTER ─── */
        .footer {
            height: 90px;
            background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy) 60%, var(--navy-mid) 100%);
            display: grid;
            grid-template-columns: 280px 1fr 1fr;
            gap: 0;
            flex-shrink: 0;
            border-top: 2px solid rgba(74,159,212,0.4);
            position: relative;
            overflow: hidden;
        }

        .footer::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='20' viewBox='0 0 60 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 10 Q15 0 30 10 Q45 20 60 10' stroke='rgba(255,255,255,0.035)' stroke-width='1.5' fill='none'/%3E%3C/svg%3E") repeat;
        }

        /* App download section */
        .footer-app {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            border-right: 1px solid rgba(255,255,255,0.1);
            z-index: 1;
        }

        .footer-app-text {
            color: #ffffff;
        }

        .footer-app-text strong {
            display: block;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1.15em;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 3px;
        }

        .footer-app-text span {
            font-size: 0.8em;
            color: rgba(255,255,255,0.7);
            line-height: 1.3;
            display: block;
        }

        .qr-box {
            width: 62px;
            height: 62px;
            background: #fff;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
        }

        .qr-box img {
            width: 58px;
            height: 58px;
        }

        .footer-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            border-right: 1px solid rgba(255,255,255,0.1);
            padding: 10px 20px;
        }

        .footer-logo-img {
            height: 52px;
            width: auto;
            object-fit: contain;
        }

        /* News ticker */
        .footer-news {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 10px 20px;
            z-index: 1;
            overflow: hidden;
        }

        .footer-news-label {
            font-size: 0.7em;
            font-weight: 700;
            color: rgba(255,255,255,0.55);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
        }

        .news-ticker-wrap {
            overflow: hidden;
            position: relative;
        }

        .news-ticker {
            display: flex;
            gap: 0;
            animation: ticker-scroll 40s linear infinite;
            white-space: nowrap;
        }

        .news-item {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding-right: 60px;
        }

        .news-dot {
            width: 6px;
            height: 6px;
            background: var(--blue-light);
            border-radius: 50%;
            flex-shrink: 0;
        }

        .news-title {
            font-size: 0.88em;
            font-weight: 600;
            color: #ffffff;
        }

        .news-date {
            font-size: 0.75em;
            color: rgba(255,255,255,0.55);
        }

        @keyframes ticker-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* ─── SCROLL ANIMATIONS ─── */
        #jobsWrapper {
            animation: scroll-up 80s linear infinite;
        }

        #coursesWrapper {
            animation: scroll-up-2 80s linear infinite;
        }

        @keyframes scroll-up {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }

        @keyframes scroll-up-2 {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            font-size: 1em;
            color: var(--text-muted);
        }

        /* ─── LAYOUT WRAPPER ─── */
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
    </style>
</head>
<body>
<div class="app">

    <!-- HEADER -->
    <div class="header">
        <div class="logo">
            <img src="bw_logos_.png" alt="Bluewater" class="logo-img">
        </div>

        <div class="header-clock" id="clock">00:00</div>

        <div class="header-weather" id="weatherWidget">
            <div class="weather-icon-large">🌤️</div>
            <div class="weather-info">
                <div class="weather-city">Antibes</div>
                <div class="weather-line" id="weatherLine">--°C · --</div>
                <div class="weather-sub" id="weatherSub">Loading...</div>
            </div>
        </div>
    </div>

    <!-- MAIN COLUMNS -->
    <div class="main">
        <!-- JOBS -->
        <div class="column">
            <div class="col-header">
                <h2>Crew Jobs</h2>
            </div>
            <div class="col-scroll-area">
                <div class="column-wrapper" id="jobsWrapper">
                    <div class="loading">Loading jobs...</div>
                </div>
            </div>
        </div>

        <!-- COURSES -->
        <div class="column">
            <div class="col-header">
                <h2>Crew Training</h2>
            </div>
            <div class="col-scroll-area">
                <div class="column-wrapper" id="coursesWrapper">
                    <div class="loading">Loading courses...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- OFFICE HOURS BAR -->
    <div class="office-bar">
        <div class="office-item">Office Hours <strong>08H00 – 17H00</strong></div>
        <div class="office-sep"></div>
        <div class="office-item">Crew Interviews <strong>09H00 – 12H00</strong></div>
        <div class="office-sep"></div>
        <div class="office-item">Tel: <strong>+33 4 93 34 45 45</strong></div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        <div class="footer-app">
            <div class="footer-app-text">
                <strong>Download Our APP</strong>
                <span>Find Jobs &amp; Courses<br>on Your Phone!</span>
            </div>
            <div class="qr-box" id="qrBox">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=116x116&data=https://www.bluewateryachting.com/app&bgcolor=ffffff&color=002558&margin=4" alt="QR Code" />
            </div>
        </div>

        <div class="footer-logo">
            <img src="bw_logos_.png" alt="Bluewater" class="footer-logo-img">
        </div>

        <div class="footer-news">
            <div class="footer-news-label">Upcoming Events &amp; Latest News</div>
            <div class="news-ticker-wrap">
                <div class="news-ticker" id="newsTicker">
                    <!-- populated by JS -->
                </div>
            </div>
        </div>
    </div>

</div>

<script>
    let jobsData = [];
    let coursesData = [];

    // ─── CLOCK ───
    function updateClock() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2,'0');
        const m = String(now.getMinutes()).padStart(2,'0');
        document.getElementById('clock').textContent = `${h}:${m}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ─── WEATHER ICONS ───
    const weatherIcons = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌧️',55:'🌧️',61:'🌧️',63:'🌧️',65:'⛈️',71:'🌨️',73:'❄️',75:'❄️',77:'❄️',80:'🌦️',81:'🌧️',82:'⛈️',85:'🌨️',86:'❄️',95:'⛈️',96:'⛈️',99:'⛈️'};
    const weatherDesc = {0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Foggy',48:'Foggy',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',61:'Light rain',63:'Rain',65:'Heavy rain',71:'Light snow',73:'Snow',75:'Heavy snow',77:'Snow grains',80:'Light showers',81:'Showers',82:'Heavy showers',85:'Light snow showers',86:'Snow showers',95:'Thunderstorm',96:'Thunderstorm with hail',99:'Heavy thunderstorm'};

    async function fetchWeather() {
        try {
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=43.5808&longitude=7.1239&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&timezone=Europe/Paris');
            const data = await res.json();
            const c = data.current;
            const temp = Math.round(c.temperature_2m);
            const icon = weatherIcons[c.weather_code] || '🌤️';
            const desc = weatherDesc[c.weather_code] || 'Partly cloudy';
            const wind = Math.round(c.wind_speed_10m);
            const hum = c.relative_humidity_2m;

            document.getElementById('weatherWidget').innerHTML = `
                <div class="weather-icon-large">${icon}</div>
                <div class="weather-info">
                    <div class="weather-city">Antibes</div>
                    <div class="weather-line">${temp}°C · ${desc}</div>
                    <div class="weather-sub">💧 ${hum}% &nbsp;💨 ${wind} km/h</div>
                </div>
            `;
        } catch(e) { console.error('Weather error', e); }
    }

    // ─── BADGE HELPER ───
    function getBadge(job) {
        // Try to infer badge from job data
        const title = (job.title || '').toLowerCase();
        const type = (job.type || '').toLowerCase();
        const extra = (job.badge || '').toLowerCase();

        if (extra === 'urgent' || type.includes('urgent')) return '<span class="badge badge-urgent">URGENT</span>';
        if (extra === 'new') return '<span class="badge badge-new">NEW</span>';
        if (type === 'permanent') return '<span class="badge badge-available">Available</span>';
        if (type === 'seasonal') return '<span class="badge badge-available">Available</span>';
        return '<span class="badge badge-more">MORE</span>';
    }

    // ─── JOB CARD ───
    function createJobCard(job) {
        const badge = getBadge(job);
        const oneImg = job.oneAccount
            ? `<img src="https://www.bluewateryachting.com/_images/internet/buttons/one.png" alt="ONE" class="one-badge-img">`
            : '';

        // Extract yacht size if present in title (e.g. "57m")
        const sizeMatch = job.title.match(/(\d+m[+]?)/i);
        const yachtSize = sizeMatch ? sizeMatch[1] : '';
        const cleanTitle = job.title;

        return `
            <div class="job-card">
                <div class="job-top">
                    <div class="job-title">
                        <a href="${job.url || '#'}" target="_blank">${cleanTitle}</a>${oneImg}
                    </div>
                    ${badge}
                </div>
                <div class="job-sub">
                    <span>${job.location}</span>
                    ${job.type ? `<span class="sep">|</span><span>${job.type}</span>` : ''}
                    ${job.salary && job.salary !== 'DOE' ? `<span class="sep">|</span><span>${job.salary}</span>` : ''}
                </div>
                <div class="job-meta">
                    ${job.qualifications ? `<span><strong>Quals:</strong> ${job.qualifications}</span>` : ''}
                    ${job.experience ? `<span><strong>Exp:</strong> ${job.experience}</span>` : ''}
                </div>
            </div>`;
    }

    // ─── COURSE CARD ───
    function createCourseCard(course) {
        let cls = 'badge-available', label = course.availability || 'Available';
        const av = (label).toLowerCase();
        if (av.includes('full') || av.includes('waiting')) { cls = 'badge-full'; }
        else if (av.includes('limited') || av.includes('left') || av.includes('spaces')) { cls = 'badge-limited'; }

        // Parse sub-note (e.g. "3 Spaces Left")
        const extraNote = av.includes('spaces') || av.includes('left') || av.includes('soon') ? label : '';
        const badgeLabel = av.includes('full') || av.includes('waiting') ? 'Fully Booked' 
                         : av.includes('limited') || av.includes('spaces') || av.includes('left') ? 'Available'
                         : 'Available';

        return `
            <div class="course-card">
                <div class="course-left">
                    <div class="course-name">
                        <a href="${course.url || '#'}" target="_blank">${course.course}</a>
                    </div>
                    <div class="course-details">
                        ${course.date ? `${course.date}` : ''}${course.location ? ` – ${course.location}` : ''}
                    </div>
                </div>
                <div class="course-right">
                    <span class="badge ${cls}">${badgeLabel}</span>
                    ${extraNote ? `<div class="course-extra">${extraNote}</div>` : ''}
                </div>
            </div>`;
    }

    // ─── FALLBACK DATA ───
    function getFallbackJobs() {
        return [
            { title:"Chief Stewardess – 60m Motor Yacht", url:"#", location:"South of France", type:"Permanent", qualifications:"STCW, ENG1, Food Hygiene", experience:"3 Seasons+", salary:"DOE", oneAccount:true, badge:"urgent" },

            { title:"Sole Chef – 57m Private Sailing Yacht", url:"#", location:"Med", type:"Permanent", qualifications:"STCW, ENG1, PBL2", experience:"1 Season+", salary:"DOE", oneAccount:true },
            { title:"Deckhand – 57m Private Sailing Yacht", url:"#", location:"Med", type:"Permanent", qualifications:"STCW, ENG1, PBL2", experience:"1 Season+", salary:"DOE", oneAccount:true },
            { title:"Sole Chef – 47m Private Motor Yacht", url:"#", location:"Western Med / Italy", type:"Seasonal", qualifications:"STCW, ENG1, Food Hygiene L2", experience:"1 Year+", salary:"8000 EUR", oneAccount:true },
            { title:"Chief Steward(ess) – 30m+ Private Motor Yacht", url:"#", location:"Mediterranean", type:"Seasonal", qualifications:"STCW, ENG1, Food Hygiene L2", experience:"3 Seasons+ as Chief Stewardess", salary:"DOE", oneAccount:true },
            { title:"Junior Housekeeper – 120m+ Motor Yacht", url:"#", location:"2026 Med", type:"Rotational 4:2", qualifications:"STCW, ENG1", experience:"1 Year+", salary:"2500 EUR", oneAccount:false }
        ];
    }

    function getFallbackCourses() {
        return [
            { date:'01 May', course:'STCW Basic Safety Training', location:'Antibes', availability:'Starting Soon', url:'#' },
            { date:'03 May', course:'Powerboat Level 2', location:'Fort Lauderdale', availability:'Fully Booked', url:'#' },
            { date:'06 May', course:'Advanced Fire Fighting', location:'Palma', availability:'Available', url:'#' },
            { date:'10 May', course:'Yachtmaster Offshore Theory', location:'Palma', availability:'3 Spaces Left', url:'#' },
            { date:'09 May', course:'GWO Sea Survival', location:'Fort Lauderdale', availability:'Available', url:'#' },
            { date:'16 Feb', course:'Celestial Navigation', location:'Antibes', availability:'Available', url:'#' },
            { date:'Online', course:'Proficiency In Designated Security Duties (PDSD)', location:'Online', availability:'Available', url:'#' }
        ];
    }

    // ─── INIT DISPLAY ───
    function initializeJobs() {
        const wrapper = document.getElementById('jobsWrapper');
        if (!jobsData.length) { wrapper.innerHTML = '<div class="loading">Loading jobs...</div>'; return; }
        const html = jobsData.map(createJobCard).join('');
        wrapper.innerHTML = html + html;
    }

    function initializeCourses() {
        const wrapper = document.getElementById('coursesWrapper');
        if (!coursesData.length) { wrapper.innerHTML = '<div class="loading">Loading courses...</div>'; return; }
        const html = coursesData.map(createCourseCard).join('');
        wrapper.innerHTML = html + html;
    }

    // ─── NEWS TICKER ───
    function initNewsTicker() {
        const items = [
            { title:'Top 5 Must-Take Courses for Yacht Crew in 2025', date:'Feb 2025' },
            { title:'Bluewater Networking Event – Antibes', date:'Mar 2025' },
            { title:'New STCW Amendments: What Crew Need to Know', date:'Jan 2025' },
            { title:'Mediterranean Season 2025 Crew Demand Report', date:'Feb 2025' },
            { title:'GWO Certification Now Required for Select Superyachts', date:'Mar 2025' },
        ];

        const html = [...items, ...items].map(i => `
            <div class="news-item">
                <div class="news-dot"></div>
                <span class="news-title">${i.title}</span>
                <span class="news-date">${i.date}</span>
            </div>
        `).join('');

        document.getElementById('newsTicker').innerHTML = html;
    }

    // ─── PARSE LIVE DATA ───
    function parseJobsFromHTML(html) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const jobs = [];
        const jobLinks = doc.querySelectorAll('a[href*="yacht-crew-job"]');
        const seen = new Set();

        jobLinks.forEach(link => {
            const url = link.href;
            if (seen.has(url) || link.textContent.trim() === 'Apply') return;
            seen.add(url);

            const title = link.textContent.trim();
            if (!title || title === 'Apply') return;

            let container = link.parentElement;
            let attempts = 0;
            while (container && attempts < 10) {
                if (container.querySelector('ul')) break;
                container = container.parentElement;
                attempts++;
            }
            if (!container) return;

            const listItems = container.querySelectorAll('li');
            let type = '', qualifications = '', experience = '', salary = '', location = 'Various';

            const nextSib = link.parentElement?.nextElementSibling;
            if (nextSib && !nextSib.querySelector('ul')) location = nextSib.textContent.trim();

            listItems.forEach(li => {
                const text = li.textContent.trim();
                if (text.match(/^(Permanent|Seasonal|Rotational|Temporary)/i)) type = text;
                else if (text.includes('Qualifications:')) qualifications = text.replace('Qualifications:', '').trim();
                else if (text.includes('Experience:')) experience = text.replace('Experience:', '').trim();
                else if (text.includes('Salary:')) salary = text.replace('Salary:', '').trim();
            });

            const oneAccount = !!container.querySelector('img[src*="one.png"]');
            jobs.push({ title, url, location: location || 'Various', type: type || 'N/A', qualifications: qualifications || 'See listing', experience: experience || 'See listing', salary: salary || 'DOE', oneAccount });
        });

        return jobs;
    }

    function parseCoursesFromHTML(html) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const courses = [];

        doc.querySelectorAll('table tr').forEach(row => {
            const cells = row.querySelectorAll('td');
            if (cells.length >= 4) {
                const date = cells[0].textContent.trim();
                const course = cells[1].textContent.trim();
                const location = cells[2].textContent.trim();
                const availLink = cells[3].querySelector('a');
                const availability = availLink ? availLink.textContent.trim() : 'N/A';
                const detailsLink = row.querySelector('a[href*="training-class"]');
                const url = detailsLink ? detailsLink.href : '#';
                if (course && course !== 'Course') courses.push({ date, course, location, availability, url });
            }
        });

        return courses;
    }

    async function fetchJobs() {
        try {
            const res = await fetch('https://www.bluewateryachting.com/crew-placement/yacht-crew/jobs');
            const html = await res.text();
            const jobs = parseJobsFromHTML(html);
            return jobs.length > 0 ? jobs : getFallbackJobs();
        } catch(e) { return getFallbackJobs(); }
    }

    async function fetchCourses() {
        try {
            const res = await fetch('https://www.bluewateryachting.com/crew-training/courses/search');
            const html = await res.text();
            const courses = parseCoursesFromHTML(html);
            return courses.length > 0 ? courses : getFallbackCourses();
        } catch(e) { return getFallbackCourses(); }
    }

    // ─── MAIN INIT ───
    async function init() {
        jobsData = getFallbackJobs();
        coursesData = getFallbackCourses();
        initializeJobs();
        initializeCourses();
        initNewsTicker();
        fetchWeather();

        const [jobs, courses] = await Promise.all([fetchJobs(), fetchCourses()]);
        jobsData = jobs;
        coursesData = courses;
        initializeJobs();
        initializeCourses();

        setInterval(async () => {
            fetchWeather();
            const [j, c] = await Promise.all([fetchJobs(), fetchCourses()]);
            jobsData = j; coursesData = c;
            initializeJobs(); initializeCourses();
        }, 30 * 60 * 1000);
    }

    init();
</script>
</body>
</html>
